const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Offscreen canvas for collision detection
const collisionCanvas = document.createElement('canvas');
const collisionCtx = collisionCanvas.getContext('2d');

let width = window.innerWidth, height = window.innerHeight, dpr = window.devicePixelRatio || 1;
let particles = [];
let collisionData = null;
let settledGrid = null; 

const mouse = { x: -1000, y: -1000, active: false };

const MAX_PARTICLES = 30000;
function initParticles() {
  particles = [];
  for (let i = 0; i < MAX_PARTICLES; i++) {
    particles.push(new Particle());
  }
  // Start with all particles inactive so they spawn gradually
  particles.forEach(p => p.active = false);
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  width = area.clientWidth;
  height = area.clientHeight;
  
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  collisionCanvas.width = width;
  collisionCanvas.height = height;
  
  settledGrid = new Uint8Array(width * height);
  if (particles.length === 0) initParticles();
  updateCollisionBuffer();
}

area.addEventListener('pointermove', (e) => {
  const rect = area.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
  mouse.active = true;
});

area.addEventListener('pointerdown', (e) => {
  const rect = area.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  
  const radius = controls.get('mouseRadius') * 2;
  const strength = controls.get('mouseStrength') * 40;

  particles.forEach(p => {
    if (p.active) {
      const dx = p.x - mx;
      const dy = p.y - my;
      const distSq = dx * dx + dy * dy;
      if (distSq < radius * radius) {
        const dist = Math.sqrt(distSq);
        const force = (1 - dist / radius) * strength;
        const angle = Math.atan2(dy, dx);
        p.vx += Math.cos(angle) * force;
        p.vy += Math.sin(angle) * force;
        p.settled = false; 
        p.settleTime = 0;
        p.unsettleTimer = 60; 
      }
    }
  });
});

area.addEventListener('pointerleave', () => {
  mouse.active = false;
});

function updateCollisionBuffer() {
  collisionCtx.clearRect(0, 0, width, height);
  
  const line1 = controls.get('line1') || '';
  const line2 = controls.get('line2') || '';
  const lines = [line1, line2].filter(l => l.trim() !== '');
  const font = controls.get('font') || { style: 'normal', weight: '900', family: 'Inter' };
  const fontSize = controls.get('textSize') || 150;
  
  collisionCtx.font = `${font.style || 'normal'} ${font.weight || '900'} ${fontSize}px ${font.family || 'Inter'}`;
  collisionCtx.fillStyle = 'white';
  collisionCtx.textAlign = 'center';
  collisionCtx.textBaseline = 'middle';

  const lineHeight = fontSize * controls.get('lineSpacing');
  const centerY = height / 2;

  if (lines.length > 0) {
    const totalHeight = (lines.length - 1) * lineHeight;
    const startY = centerY - totalHeight / 2;
    lines.forEach((line, i) => {
      collisionCtx.fillText(line, width / 2, startY + i * lineHeight);
    });
  }
  
  const imgData = collisionCtx.getImageData(0, 0, width, height);
  collisionData = new Uint32Array(imgData.data.buffer);
  if (settledGrid) settledGrid.fill(0);
  
  // Reset all particles to re-target new text immediately
  particles.forEach(p => p.reset());
}

const themes = {
  'Classic Confetti': ['#ff0000', '#4169e1', '#ffff00', '#228b22', '#ffc0cb', '#87ceeb', '#ffffff'],
  'Neon Night': ['#ff00ff', '#00ffff', '#ffff00', '#ff0000', '#00ff00', '#ffffff'],
  'Soft Pastel': ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', '#ffffff'],
  'Monochrome': ['#ffffff', '#cccccc', '#999999', '#666666', '#333333']
};

function getPalette() {
  const theme = controls.get('theme');
  if (theme === 'Custom Palette') return controls.get('colors');
  return themes[theme] || themes['Classic Confetti'];
}

class Particle {
  constructor() {
    this.reset();
    this.active = false;
  }

  reset() {
    const mode = controls.get('collisionMode');
    if (mode === 'Fill Inside (Positive Space)' && collisionData) {
      let attempts = 0;
      let foundX = Math.random() * width;
      while (attempts < 100) {
        let x = Math.floor(Math.random() * width);
        let hasText = false;
        for (let y = 0; y < height; y += 10) {
          if (collisionData[y * width + x] !== 0) {
            hasText = true;
            break;
          }
        }
        if (hasText) {
          foundX = x;
          break;
        }
        attempts++;
      }
      this.x = foundX;
    } else {
      this.x = Math.random() * width;
    }
    
    this.y = -20 - Math.random() * 500;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = Math.random() * 3 + 2;
    const palette = getPalette();
    this.color = palette[Math.floor(Math.random() * palette.length)];
    this.radius = controls.get('dotSize') * (0.8 + Math.random() * 0.4);
    this.active = true;
    this.settled = false;
    this.settleTime = 0;
    this.unsettleTimer = 0;
  }

  update() {
    if (!this.active) return;
    
    if (this.unsettleTimer > 0) this.unsettleTimer--;

    const mouseMode = controls.get('mouseMode');
    const mouseRadius = controls.get('mouseRadius');
    const mouseStrength = controls.get('mouseStrength');

    if (mouse.active && mouseMode !== 'None') {
      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const distSq = dx * dx + dy * dy;
      const radiusSq = mouseRadius * mouseRadius;

      if (distSq < radiusSq) {
        const dist = Math.sqrt(distSq);
        const force = (1 - dist / mouseRadius) * mouseStrength * 15; 
        const angle = Math.atan2(dy, dx);
        
        if (mouseMode === 'Repel') {
          this.vx += Math.cos(angle) * force;
          this.vy += Math.sin(angle) * force;
        } else if (mouseMode === 'Attract') {
          this.vx -= Math.cos(angle) * force;
          this.vy -= Math.sin(angle) * force;
        }
        
        if (force > 0.2) {
          this.settled = false;
          this.settleTime = 0;
          this.unsettleTimer = 30;
          this.vx += (Math.random() - 0.5) * 2;
          this.vy += (Math.random() - 0.5) * 2;
        }
      }
    }

    if (this.settled) {
      this.settleTime += 1/60;
      const maxLife = controls.get('settleLife') || 120;
      if (this.settleTime > maxLife) {
        this.active = false; // Mark for re-spawning
      }
      return;
    }

    const gravity = controls.get('gravity');
    const bounce = controls.get('bounciness');
    const mode = controls.get('collisionMode');
    const accumulation = controls.get('accumulation');
    
    this.vy += gravity;
    
    const friction = controls.get('friction');
    this.vx *= friction;
    this.vy *= friction;
    
    let nextX = this.x + this.vx;
    let nextY = this.y + this.vy;

    const ix = Math.floor(nextX);
    const iy = Math.floor(nextY);

    if (ix >= 0 && ix < width && iy >= 0 && iy < height) {
      if (!collisionData) return;
      const pixel = collisionData[iy * width + ix];
      
      const curX = Math.floor(this.x);
      const curY = Math.floor(this.y);
      const currentPixel = (curX >= 0 && curX < width && curY >= 0 && curY < height) 
        ? collisionData[curY * width + curX] 
        : 0;
      
      const isSettledBelow = iy < height - 1 && (
        settledGrid[(iy + 1) * width + ix] || 
        settledGrid[(iy + 1) * width + Math.max(0, ix - 5)] || 
        settledGrid[(iy + 1) * width + Math.min(width - 1, ix + 5)] ||
        (iy < height - 5 && settledGrid[(iy + 4) * width + ix])
      );
      
      let shouldBounce = false;
      let shouldSettle = false;

      if (mode === 'Bounce Off (Negative Space)') {
        if (pixel !== 0 || isSettledBelow || iy >= height - 1) {
          shouldBounce = true;
          if (accumulation && (isSettledBelow || iy >= height - 1 || (pixel !== 0 && this.vy > 0))) {
            shouldSettle = Math.random() < 0.98;
          }
        }
      } else {
        if (pixel !== 0) {
          const pixelBelow = (iy < height - 1) ? collisionData[(iy + 1) * width + ix] : 0;
          if (isSettledBelow || (iy < height - 1 && pixelBelow === 0) || iy >= height - 1) {
            shouldSettle = accumulation; 
          }
        } else {
          if (currentPixel !== 0) {
            shouldBounce = true;
          }
        }
      }

      if (shouldSettle && this.unsettleTimer <= 0) {
        this.settled = true;
        this.vx = 0;
        this.vy = 0;
        return;
      }

      if (shouldBounce) {
        if (mode === 'Fill Inside (Positive Space)') {
          this.vx *= -bounce;
          this.vy *= -bounce;
          nextX = this.x;
          nextY = this.y;
        } else {
          this.vx *= -bounce;
          this.vy *= -bounce;
          this.vx += (Math.random() - 0.5) * 1.0;
          this.vy += (Math.random() - 0.5) * 1.0;
          nextX = this.x + this.vx;
          nextY = this.y + this.vy;
        }
      }
    }

    this.x = nextX;
    this.y = nextY;

    if (this.y > height + 50 || this.x < -50 || this.x > width + 50) {
      this.active = false;
    }
  }

  draw() {
    if (!this.active) return;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

function draw() {
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  const trail = controls.get('trailLength');
  ctx.fillStyle = controls.get('bgColor');
  if (trail > 0) {
    ctx.globalAlpha = 1 - trail;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1.0;
  } else {
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  ctx.restore();

  if (controls.get('showText')) {
    ctx.drawImage(collisionCanvas, 0, 0);
  }

  if (settledGrid) settledGrid.fill(0);
  const dotSize = controls.get('dotSize');
  for (let i = 0; i < particles.length; i++) {
    let p = particles[i];
    if (p.active && p.settled) {
      const ix = Math.floor(p.x);
      const iy = Math.floor(p.y);
      if (ix >= 0 && ix < width && iy >= 0 && iy < height) {
        const range = Math.floor(dotSize * 0.6);
        const startX = Math.max(0, ix - range);
        const endX = Math.min(width - 1, ix + range);
        for (let sx = startX; sx <= endX; sx++) {
          settledGrid[iy * width + sx] = 1;
        }
      }
    }
  }

  const density = controls.get('density');
  let spawned = 0;
  for (let i = 0; i < particles.length; i++) {
    let p = particles[i];
    if (!p.active) {
      p.reset(); 
      spawned++;
      if (spawned >= density) break;
    }
  }

  for (let i = 0; i < particles.length; i++) {
    let p = particles[i];
    p.update();
    p.draw();
  }

  requestAnimationFrame(draw);
}

    p.color = palette[Math.floor(Math.random() * palette.length)];
  });
});
controls.onChange('colors', () => {
  if (controls.get('theme') === 'Custom Palette') {
    const palette = controls.get('colors');
    particles.forEach(p => {
      p.color = palette[Math.floor(Math.random() * palette.length)];
    });
  }
});

controls.onAction('refillText', updateCollisionBuffer);
controls.onAction('resetParticles', () => {
  particles.forEach(p => p.active = false);
});

controls.onChange('accumulation', (val) => {
  if (!val) {
    particles.forEach(p => p.settled = false);
    if (settledGrid) settledGrid.fill(0);
  }
});

resize();
requestAnimationFrame(draw);

    }

    // System Background Wiring
    if (typeof CanvasRuntimeAPI !== 'undefined') {
      var __sysBgVal = controls.get('__sys_bg');
      if (__sysBgVal) CanvasRuntimeAPI.setBackground(__sysBgVal);
